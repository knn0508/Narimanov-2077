services:
  - type: web
    name: smartwave-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn smartwave_ai.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render dashboard
      - key: SMARTWAVE_YOLO_MODEL_PATH
        value: "weights/yolov8m-seg.pt"
      - key: YOLO_CONFIG_DIR
        value: "/tmp"
